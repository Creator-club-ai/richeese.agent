<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card News Slide Template</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style id="slide-custom-css"></style>
</head>

<body>
    <div id="slide-container">
        <div class="chrome-top" id="chrome-top">
            <div class="logo" id="brand-label" style="font-size: 24px; font-weight: 800; letter-spacing: -0.02em;">Brand</div>
            <div class="eyebrow" id="eyebrow">Card News</div>
        </div>

        <div id="content-area"></div>

        <div class="chrome-bottom" id="chrome-bottom">
            <div class="progress-track" id="progress-track">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="page-num" id="page-indicator">1 / 10</div>
        </div>
    </div>

    <script>
        function renderSlide(slide, currentIdx, totalSlides) {
            const container = document.getElementById('slide-container');
            const contentArea = document.getElementById('content-area');
            const chromeTop = document.getElementById('chrome-top');
            const chromeBottom = document.getElementById('chrome-bottom');
            const brandLabel = document.getElementById('brand-label');
            const eyebrow = document.getElementById('eyebrow');
            const pageNum = document.getElementById('page-indicator');
            const progressTrack = document.getElementById('progress-track');
            const progressBar = document.getElementById('progress-bar');
            const customCSS = document.getElementById('slide-custom-css');

            const theme = (slide.theme || 'light').toLowerCase();
            const chrome = (slide.chrome || 'full').toLowerCase();
            const footer = (slide.footer || 'minimal').toLowerCase();
            const brandText = slide.brandLabel || '';
            const eyebrowText = slide.eyebrow || '';
            const showTopChrome = chrome === 'full';
            const showBottomChrome = chrome !== 'none' && footer !== 'none';

            contentArea.innerHTML = slide.html || '';
            customCSS.textContent = slide.css || '';

            container.classList.remove('theme-light', 'theme-dark');
            container.classList.add(theme === 'dark' ? 'theme-dark' : 'theme-light');

            chromeTop.style.display = showTopChrome ? '' : 'none';
            chromeBottom.style.display = showBottomChrome ? '' : 'none';
            contentArea.style.padding = chrome === 'none' ? '0' : '';

            brandLabel.textContent = brandText;
            brandLabel.style.display = brandText ? '' : 'none';

            eyebrow.textContent = eyebrowText;
            eyebrow.style.display = eyebrowText ? '' : 'none';

            if (footer === 'progress') {
                progressTrack.style.display = 'flex';
                progressBar.style.width = `${((currentIdx + 1) / totalSlides) * 100}%`;
            } else {
                progressTrack.style.display = 'none';
                progressBar.style.width = '0';
            }

            pageNum.textContent = `${currentIdx + 1} / ${totalSlides}`;
            pageNum.style.display = footer === 'none' ? 'none' : '';
        }

        window.renderSlide = renderSlide;
    </script>
</body>

</html>
